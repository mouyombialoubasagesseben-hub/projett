<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil - TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <main class="profil-page">
    <a class="retour" href="dashboard.html">Retour au dashboard</a>

    <section class="profil-card">
      <h1 id="nomProfil">Profil</h1>
      <p id="emailProfil"></p>

      <div class="profil-stats">
        <div><b id="nbTableaux">0</b>tableaux</div>
        <div><b id="nbColonnes">0</b>colonnes</div>
        <div><b id="nbTaches">0</b>taches</div>
      </div>
    </section>

    <section class="profil-card">
      <div id="msg" class="alerte" style="display:none"></div>

      <form id="formNom">
        <label for="nouveauNom">Modifier le nom</label>
        <input id="nouveauNom" type="text">
        <button class="btn" type="submit">Mettre a jour</button>
      </form>
    </section>

    <section class="profil-card">
      <form id="formMdp">
        <label for="mdp1">Nouveau mot de passe</label>
        <input id="mdp1" type="password">

        <label for="mdp2">Confirmer</label>
        <input id="mdp2" type="password">

        <button class="btn" type="submit">Changer mot de passe</button>
      </form>
    </section>

    <section class="profil-card">
      <button id="btnSupprimer" class="btn" style="background:#b91c1c">Supprimer mon compte</button>
    </section>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/storage.js"></script>
  <script>
    var session = forcerSession();
    if (!session) {
      window.location.href = 'login.html';
    }

    var nomProfil = document.getElementById('nomProfil');
    var emailProfil = document.getElementById('emailProfil');
    var inputNom = document.getElementById('nouveauNom');

    nomProfil.textContent = session.nom;
    emailProfil.textContent = session.email;
    inputNom.value = session.nom;

    var tableaux = chargerTableaux(session.id);
    var nbColonnes = 0;
    var nbTaches = 0;

    tableaux.forEach(function (tb) {
      nbColonnes += tb.colonnes.length;
      tb.colonnes.forEach(function (col) {
        nbTaches += col.cartes.length;
      });
    });

    document.getElementById('nbTableaux').textContent = tableaux.length;
    document.getElementById('nbColonnes').textContent = nbColonnes;
    document.getElementById('nbTaches').textContent = nbTaches;

    function alerte(msg, ok) {
      var box = document.getElementById('msg');
      box.style.display = 'block';
      box.className = 'alerte ' + (ok ? 'succes' : 'erreur');
      box.textContent = msg;
      setTimeout(function () {
        box.style.display = 'none';
      }, 2300);
    }

    document.getElementById('formNom').addEventListener('submit', function (e) {
      e.preventDefault();
      var nom = inputNom.value.trim();

      if (nom.length < 2) {
        alerte('Nom trop court', false);
        return;
      }

      var users = lireUsers();
      var user = users.find(function (u) { return u.id === session.id; });

      if (user) {
        user.nom = nom;
        sauverUsers(users);
      }

      session.nom = nom;
      definirSession(session);
      nomProfil.textContent = nom;
      alerte('Nom mis a jour', true);
    });

    document.getElementById('formMdp').addEventListener('submit', function (e) {
      e.preventDefault();
      var mdp1 = lireValeur('mdp1');
      var mdp2 = lireValeur('mdp2');

      if (mdp1.length < 6) {
        alerte('6 caracteres minimum', false);
        return;
      }

      if (mdp1 !== mdp2) {
        alerte('Mots de passe differents', false);
        return;
      }

      var users = lireUsers();
      var user = users.find(function (u) { return u.id === session.id; });

      if (user) {
        user.motdepasse = mdp1;
        sauverUsers(users);
      }

      this.reset();
      alerte('Mot de passe change', true);
    });

    document.getElementById('btnSupprimer').addEventListener('click', function () {
      if (!confirm('Supprimer definitivement votre compte ?')) return;

      var users = lireUsers().filter(function (u) { return u.id !== session.id; });
      sauverUsers(users);
      localStorage.removeItem(CLES.boards + session.id);
      supprimerSession();
      window.location.href = '../index.html';
    });
  </script>
</body>
</html>
